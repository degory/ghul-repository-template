  create-release:
    needs: [version, publish-package]
    name: Create release
    runs-on: ubuntu-latest

    timeout-minutes: 5
    if: ${{ github.event_name == 'push' }}

    permissions:
      contents: 'write'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    - name: Download package
      uses: actions/download-artifact@v4
      with:
        name: package
        path: nupkg

    - name: Create changelog
      run: git log -1 --format="%s%n%n%b%n%n" >changelog.txt

    - name: Create a release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ needs.version.outputs.tag }}" \
          ./nupkg/example-package.${{ needs.version.outputs.package }}.nupkg \
          --title "${{ needs.version.outputs.tag }}" \
          --notes-file changelog.txt
