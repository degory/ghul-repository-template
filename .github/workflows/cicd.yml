# CI/CD pipeline. 

name: CICD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true

  pull_request:
  push:
    branches: [master, main]

env:
  CI: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  version:
    name: Determine the version number
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      tag: ${{ steps.package_version.outputs.tag }}
      package: ${{ steps.package_version.outputs.package }}

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: '0'

    # Calculates the next version from the git history. This action only
    # reads the repository - it never creates tags or releases. The next
    # version is a major/minor/patch bump of the most recent vX.Y.Z tag;
    # a #major or #minor marker in a commit subject picks the bump level,
    # otherwise each commit bumps the patch number.
    - name: Calculate the semantic version
      id: semver
      uses: paulhatch/semantic-version@v6.0.2
      with:
        tag_prefix: 'v'
        major_pattern: '#major'
        minor_pattern: '#minor'
        version_format: '${major}.${minor}.${patch}'

    - name: Determine the package version
      id: package_version
      run: |
        manual="${{ github.event.inputs.version }}"
        if [ -n "$manual" ]; then
          # version supplied via the workflow_dispatch input
          package="${manual#v}"
        else
          package="${{ steps.semver.outputs.version }}"
          # pull request builds get a prerelease version so they can
          # never collide with a real release
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            package="${package}-beta.${{ github.run_number }}"
          fi
        fi
        echo "tag=v${package}" >> "$GITHUB_OUTPUT"
        echo "package=${package}" >> "$GITHUB_OUTPUT"
        echo "Version: v${package}"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    container: 
      image: mcr.microsoft.com/dotnet/sdk:8.0

    timeout-minutes: 5
    needs: [version]

    steps:
    - uses: actions/checkout@v4

    - name: Restore local tools
      run: dotnet tool restore

    - name: Run unit tests
      run: dotnet test unit-tests

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    container: 
      image: mcr.microsoft.com/dotnet/sdk:8.0

    timeout-minutes: 5
    needs: [version]

    steps:
    - uses: actions/checkout@v4

    - name: .NET tool restore
      run: dotnet tool restore

    - name: Build
      run: dotnet build

    - name: Run and verify output
      run: |
        STDOUT=$(dotnet run)
        echo "Output: ${STDOUT}"
        test "${STDOUT}" = "Hello world!"

  build:
    name: Build the package
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/dotnet/sdk:8.0

    timeout-minutes: 10
    needs: [version]

    steps:
    - uses: actions/checkout@v4

    - name: .NET tool restore
      run: dotnet tool restore

    - name: Create package
      run: dotnet pack -p:Version=${{ needs.version.outputs.package }}

    - name: Upload .NET package artefact
      uses: actions/upload-artifact@v4
      with:
        name: package
        path: nupkg

  package-tests:
    name: Test the package
    runs-on: ubuntu-latest

    container: 
      image: mcr.microsoft.com/dotnet/sdk:8.0

    timeout-minutes: 10
    needs: [version,build]

    steps:
    - uses: actions/checkout@v4

    - name: Download template package
      uses: actions/download-artifact@v4
      with:
        name: package
        path: nupkg

    # TODO: add actual package tests here

  publish-package:
    name: Publish the package
    runs-on: ubuntu-latest

    container: 
      image: mcr.microsoft.com/dotnet/sdk:8.0

    timeout-minutes: 10
    needs: [build, unit-tests, integration-tests, package-tests]

    steps:
    - uses: actions/checkout@v4

    - name: Download template package
      uses: actions/download-artifact@v4
      with:
        name: package
        path: nupkg

    - name: |
        "TODO: configure for your NuGet feeds" 
      run: |
        echo "TODO: configure the 'publish package' job in .github/workflows/cicd.yml"

    # TODO: to push the built package to GitHub replace 'your-github-username' with your GitHub
